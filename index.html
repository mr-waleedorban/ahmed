<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Waleed // Ultimate Hub</title>
    <style>
        :root {
            --bg-color: #060911;
            --card-bg: #0d1321;
            --text-color: #f9fafb;
            --accent-color: #00f5d4;
            --accent-pink: #cc00ff;
            --muted-text: #9ca3af;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,245,212,0.1) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
            z-index: -1;
        }

        /* جزيئات النيون التي تتبع الماوس */
        .cursor-particle {
            position: fixed;
            width: 6px; height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            animation: fadeParticle 0.4s linear forwards;
        }

        header {
            text-align: center;
            padding: 50px 20px 10px 20px;
        }

        .creative-logo {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 15px;
            padding: 5px 20px;
            color: #fff;
            text-shadow: 0 0 7px #fff, 0 0 10px #fff, 0 0 21px var(--accent-color), 0 0 42px var(--accent-color);
            animation: glitchGlow 2s infinite alternate;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .creative-logo:hover {
            transform: scale(1.15) rotate(-3deg);
            text-shadow: 0 0 7px #fff, 0 0 10px #fff, 0 0 21px var(--accent-pink), 0 0 42px var(--accent-pink);
        }

        .tagline {
            color: var(--accent-color);
            font-family: monospace;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .countdown-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255,255,255,0.05);
            max-width: 600px;
            margin: 0 auto 30px auto;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0, 245, 212, 0.05);
        }
        .countdown-title {
            font-size: 0.9rem;
            color: var(--accent-pink);
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .timer { display: flex; justify-content: center; gap: 15px; }
        .time-box {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 12px;
            min-width: 60px;
            border: 1px solid rgba(0, 245, 212, 0.15);
        }
        .time-box span { display: block; font-size: 1.5rem; font-weight: bold; color: var(--text-color); }
        .time-box label { font-size: 0.75rem; color: var(--muted-text); }

        .main-container { max-width: 850px; margin: 0 auto; padding: 0 20px 60px 20px; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .tab-btn:hover {
            box-shadow: 0 0 10px rgba(204, 0, 255, 0.4);
            border-color: var(--accent-pink);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent-color), #00bbf9);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 245, 212, 0.4);
        }

        .content-panel {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .content-panel.active { display: block; animation: fadeIn 0.4s ease; }

        h2 { color: var(--accent-color); margin-top: 0; font-size: 1.6rem; display: flex; align-items: center; gap: 10px; }

        .skill-wrapper { margin-top: 20px; }
        .skill-info { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 5px; }
        .skill-bar { width: 100%; background: #151c2c; border-radius: 10px; height: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.02); }
        .skill-progress { height: 100%; background: linear-gradient(90deg, var(--accent-pink), var(--accent-color)); border-radius: 10px; width: 0%; transition: width 1s ease-in-out; }

        .spotify-card {
            background: #04060a;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            border: 1px solid #1db954;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.1);
        }
        .spot-icon { font-size: 2rem; color: #1db954; animation: pulse 1.5s infinite; }
        .spot-info marquee { color: var(--text-color); font-weight: bold; width: 180px; }
        .spot-info p { margin: 2px 0 0 0; font-size: 0.8rem; color: var(--muted-text); }

        .msg-form input, .msg-form textarea {
            width: 100%; background: #161f30; border: 1px solid rgba(255,255,255,0.08);
            padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; box-sizing: border-box;
        }
        .msg-form textarea { resize: none; height: 80px; }
        .msg-form button {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-pink));
            color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%;
            transition: opacity 0.2s;
        }
        .msg-form button:hover { opacity: 0.9; }

        .achieve-badge {
            background: rgba(255, 215, 0, 0.03); border: 1px dashed #ffd700;
            padding: 10px; border-radius: 10px; margin-top: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.85rem;
        }

        #admin-panel {
            background: #190724; border: 2px solid var(--accent-pink);
            margin-top: 25px; border-radius: 20px; padding: 25px; display: none;
        }
        .msg-item {
            background: rgba(255,255,255,0.04); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; border-right: 3px solid var(--accent-color);
        }

        /* الأنميشنز */
        @keyframes fadeParticle { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.2); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes glitchGlow {
            0%, 100% { text-shadow: 0 0 4px #fff, 0 0 11px var(--accent-color), 0 0 30px var(--accent-color); }
            50% { text-shadow: 0 0 4px #fff, 0 0 15px var(--accent-pink), 0 0 40px var(--accent-pink); }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.1); direction: ltr; }
        .admin-link { cursor: pointer; text-decoration: underline; color: var(--accent-pink); }
    </style>
</head>

    <!-- المؤثر الصوتي الخفيف (Synth Click) -->
    <script>
        function playClickSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.05);
        }
    </script>
